use_default_settings: true

server:
  secret_key: "clinic-atlas-dev-key-change-in-production"
  bind_address: "0.0.0.0"
  port: 8080

search:
  formats:
    - html
    - json
  default_lang: "en"

engines:
  - name: google
    engine: google
    shortcut: go
    disabled: false
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
